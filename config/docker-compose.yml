services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: fireflies_db
      POSTGRES_USER: fireflies_user
      POSTGRES_PASSWORD: fireflies2026
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fireflies_user -d fireflies_db"]
      interval: 3s
      timeout: 3s
      retries: 5
      
  app:
    build:
      context: ..
      dockerfile: config/app.Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ../app:/app
    depends_on:
      - db
    env_file:
      - ../app/.env
    environment:
      DB_HOST: db

  gui:
    build:
      context: ..
      dockerfile: config/gui.Dockerfile
    ports:
      - "5173:5173"
    volumes:
      - ../gui:/app
    depends_on:
      - app

volumes:
  postgres_data:
